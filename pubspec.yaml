name: habispace
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  dio: ^5.9.2
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  bloc: 8.1.4
  flutter_bloc: ^8.1.6
  get_it: ^9.2.1
  shared_preferences:
  easy_localization: ^3.0.8
  go_router: ^17.2.3
  equatable: ^2.0.8
  google_fonts:
  smooth_page_indicator:
  font_awesome_flutter:
  dartz:
  google_sign_in:

dev_dependencies:
  flutter_test:
    sdk: flutter
  pretty_bloc_observer: ^1.0.4



flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/translations/
 

flutter_native_splash:
  color: "#1597A8"
  image: assets/images/logo_other.png
  android_gravity: fill
  ios_content_mode: scaleAspectFit
  android: true
  ios: true
  fullscreen: true
  android_12:
    image: assets/images/android12.png
    icon_background_color: "#1597A8"
    color: "#1597A8"
